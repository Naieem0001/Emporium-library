<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Emporium Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #1B2A41; --navy2: #243B55;
      --orange: #FF7A18; --cream: #F8FAFC;
      --gray: #F1F5F9; --text: #2E2E2E; --muted: #6B7280;
    }
    body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--text); }

    /* ===== LOGIN SCREEN ===== */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
    }
    .login-box {
      background: white; border-radius: 16px;
      padding: 48px 40px; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-box i { font-size: 48px; color: var(--orange); margin-bottom: 16px; }
    .login-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px; color: var(--navy); margin-bottom: 8px;
    }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-size: 15px; font-family: 'Poppins', sans-serif;
      outline: none; margin-bottom: 16px;
      text-align: center; letter-spacing: 4px;
    }
    .login-box input:focus { border-color: var(--orange); }
    .login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      font-family: 'Poppins', sans-serif; cursor: pointer;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      color: #DC2626; font-size: 13px;
      margin-top: 12px; display: none;
    }

    /* ===== ADMIN PANEL ===== */
    .admin-panel { display: none; }

    .admin-navbar {
      background: var(--navy); padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-navbar .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: white; text-decoration: none;
    }
    .admin-navbar span {
      background: var(--orange); color: white;
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .logout-btn {
      background: rgba(255,255,255,0.1); color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 16px; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      font-family: 'Poppins', sans-serif;
    }

    .admin-body { padding: 40px; max-width: 1200px; margin: 0 auto; }

    /* ===== STATS ===== */
    .admin-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; margin-bottom: 40px;
    }
    .stat-card {
      background: white; border-radius: 12px;
      padding: 24px; text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .stat-card i { font-size: 28px; color: var(--orange); margin-bottom: 10px; }
    .stat-card h3 { font-size: 32px; color: var(--navy); font-family: 'Playfair Display', serif; }
    .stat-card p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ===== ADD BOOK FORM ===== */
    .form-section {
      background: white; border-radius: 16px;
      padding: 40px; margin-bottom: 40px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .form-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px; color: var(--navy); margin-bottom: 24px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 12px; font-weight: 600; color: var(--navy);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select {
      padding: 11px 14px;
      border: 1.5px solid #E2E8F0; border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--orange); }

    .cover-preview {
      width: 80px; height: 110px;
      object-fit: cover; border-radius: 6px;
      border: 1px solid #E2E8F0; margin-top: 8px;
      display: none;
    }

    .toggle-group {
      display: flex; gap: 16px; margin-top: 4px;
    }
    .toggle-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--text); cursor: pointer;
    }
    .toggle-label input { width: auto; margin: 0; }

    .add-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, var(--orange), #FF9F43);
      color: white; border: none; padding: 13px 32px;
      border-radius: 8px; font-size: 15px; font-weight: 600;
      font-family: 'Poppins', sans-serif; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .add-btn:hover { opacity: 0.9; }

    /* ===== BOOKS TABLE ===== */
    .table-section {
      background: white; border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .table-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .table-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px; color: var(--navy);
    }
    .table-search {
      padding: 9px 14px; border: 1.5px solid #E2E8F0;
      border-radius: 8px; font-size: 14px;
      font-family: 'Poppins', sans-serif; outline: none; width: 220px;
    }
    .table-search:focus { border-color: var(--orange); }

    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-tab {
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid #E2E8F0; background: white;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: 'Poppins', sans-serif; transition: all 0.2s;
    }
    .filter-tab.active {
      background: var(--navy); color: white; border-color: var(--navy);
    }

    .books-table { width: 100%; border-collapse: collapse; }
    .books-table th {
      text-align: left; padding: 12px 16px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid #F1F5F9;
    }
    .books-table td {
      padding: 14px 16px; border-bottom: 1px solid #F1F5F9;
      font-size: 14px; vertical-align: middle;
    }
    .books-table tr:hover td { background: #FAFAFA; }

    .book-cover-thumb {
      width: 36px; height: 50px;
      object-fit: cover; border-radius: 4px;
      border: 1px solid #E2E8F0;
    }
    .genre-badge {
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
      background: rgba(27,42,65,0.08); color: var(--navy);
    }
    .trending-badge {
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
      background: rgba(255,122,24,0.1); color: var(--orange);
    }
    .new-badge {
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
      background: rgba(16,185,129,0.1); color: #059669;
    }
    .delete-btn {
      background: rgba(220,38,38,0.08); color: #DC2626;
      border: none; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 500;
      font-family: 'Poppins', sans-serif; transition: all 0.2s;
    }
    .delete-btn:hover { background: #DC2626; color: white; }
    .edit-btn {
      background: rgba(27,42,65,0.08); color: var(--navy);
      border: none; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 500;
      font-family: 'Poppins', sans-serif; transition: all 0.2s;
      margin-right: 6px;
    }
    .edit-btn:hover { background: var(--navy); color: white; }

    .empty-table {
      text-align: center; padding: 40px;
      color: var(--muted); font-size: 15px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: var(--navy); color: white;
      padding: 14px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 500;
      transform: translateY(80px); opacity: 0;
      transition: all 0.35s; z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      .admin-body { padding: 20px 16px; }
      .admin-stats { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-section, .table-section { padding: 24px 16px; }
      .books-table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <i class="fa-solid fa-shield-halved"></i>
    <h2>Admin Access</h2>
    <p>Sign in with your Firebase admin account</p>
    <input type="email" id="adminEmail" placeholder="Admin email"
           autocomplete="username"
           onkeydown="if(event.key==='Enter') adminLogin()" />
    <input type="password" id="passwordInput" placeholder="Admin password"
           autocomplete="current-password"
           onkeydown="if(event.key==='Enter') adminLogin()" />
    <button class="login-btn" onclick="adminLogin()">
      <i class="fa-solid fa-unlock"></i> Access Panel
    </button>
    <p class="login-error" id="loginError">Sign in failed. Check your credentials.</p>
  </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div class="admin-panel" id="adminPanel">

  <nav class="admin-navbar">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="index.html" class="logo">Emporium Library</a>
      <span>Admin</span>
    </div>
    <button class="logout-btn" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </nav>

  <div class="admin-body">

    <!-- STATS -->
    <div class="admin-stats">
      <div class="stat-card">
        <i class="fa-solid fa-book"></i>
        <h3 id="totalBooks">0</h3>
        <p>Total Books</p>
      </div>
      <div class="stat-card">
        <i class="fa-solid fa-fire"></i>
        <h3 id="trendingCount">0</h3>
        <p>Trending Books</p>
      </div>
      <div class="stat-card">
        <i class="fa-solid fa-star"></i>
        <h3 id="newReleaseCount">0</h3>
        <p>New Releases</p>
      </div>
    </div>

    <!-- ADD BOOK FORM -->
    <div class="form-section">
      <h2><i class="fa-solid fa-plus" style="color:var(--orange);margin-right:10px"></i>Add New Book</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Book Title *</label>
          <input type="text" id="bookTitle" placeholder="e.g. The Alchemist" />
        </div>
        <div class="form-group">
          <label>Author *</label>
          <input type="text" id="bookAuthor" placeholder="e.g. Paulo Coelho" />
        </div>
        <div class="form-group">
          <label>Genre *</label>
          <select id="bookGenre">
            <option value="fiction">Fiction</option>
            <option value="literature">Literature</option>
            <option value="science-fiction">Science Fiction</option>
            <option value="non-fiction">Non-Fiction</option>
            <option value="horror-thriller">Horror & Thriller</option>
            <option value="rom-com">Romance</option>
            <option value="spirituality">Spirituality</option>
            <option value="religion">Religion</option>
            <option value="academic">Academic</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cover Image URL *</label>
          <input type="url" id="bookCover" placeholder="https://covers.openlibrary.org/..." 
                 oninput="previewCover(this.value)" />
          <img id="coverPreview" class="cover-preview" />
        </div>
        <div class="form-group full">
          <label>Google Drive Link *</label>
          <input type="url" id="bookLink" placeholder="https://drive.google.com/file/d/..." />
        </div>
        <div class="form-group full">
          <label>Flags</label>
          <div class="toggle-group">
            <label class="toggle-label">
              <input type="checkbox" id="bookTrending" />
              🔥 Mark as Trending
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="bookNewRelease" />
              ⭐ Mark as New Release
            </label>
          </div>
        </div>
      </div>
      <button class="add-btn" onclick="addBook()">
        <i class="fa-solid fa-plus"></i> Add Book
      </button>
    </div>

    <!-- BOOKS TABLE -->
    <div class="table-section">
      <div class="table-header">
        <h2><i class="fa-solid fa-list" style="color:var(--orange);margin-right:10px"></i>All Books</h2>
        <input type="text" class="table-search" id="tableSearch" 
               placeholder="Search books..." oninput="filterTable()" />
      </div>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" onclick="setGenreFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setGenreFilter('fiction', this)">Fiction</button>
        <button class="filter-tab" onclick="setGenreFilter('literature', this)">Literature</button>
        <button class="filter-tab" onclick="setGenreFilter('science-fiction', this)">Sci-Fi</button>
        <button class="filter-tab" onclick="setGenreFilter('non-fiction', this)">Non-Fiction</button>
        <button class="filter-tab" onclick="setGenreFilter('horror-thriller', this)">Horror</button>
        <button class="filter-tab" onclick="setGenreFilter('rom-com', this)">Romance</button>
        <button class="filter-tab" onclick="setGenreFilter('spirituality', this)">Spirituality</button>
        <button class="filter-tab" onclick="setGenreFilter('religion', this)">Religion</button>
        <button class="filter-tab" onclick="setGenreFilter('academic', this)">Academic</button>
      </div>
      <table class="books-table">
        <thead>
          <tr>
            <th>Cover</th>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Flags</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="booksTableBody">
          <tr><td colspan="6" class="empty-table">Loading books...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDCQag_jLEkTVp-DEE2iqk1Pj5ZmjTesXE",
  authDomain: "emporium-library.firebaseapp.com",
  projectId: "emporium-library",
  storageBucket: "emporium-library.firebasestorage.app",
  messagingSenderId: "243007325031",
  appId: "1:243007325031:web:efc7981d8933e7ca3c65c2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function escapeHTML(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function safeUrl(url) {
  const raw = String(url || "").trim();
  if (!raw) return "";
  try {
    const parsed = new URL(raw);
    if (parsed.protocol === "http:" || parsed.protocol === "https:") return parsed.href;
  } catch (err) {
    return "";
  }
  return "";
}

function setAdminUi(isLoggedIn) {
  document.getElementById("loginScreen").style.display = isLoggedIn ? "none" : "flex";
  document.getElementById("adminPanel").style.display = isLoggedIn ? "block" : "none";
}

function adminLogin() {
  const email = document.getElementById("adminEmail").value.trim();
  const password = document.getElementById("passwordInput").value;
  const loginError = document.getElementById("loginError");
  if (!email || !password) {
    loginError.textContent = "Email and password are required.";
    loginError.style.display = "block";
    return;
  }
  loginError.style.display = "none";
  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("passwordInput").value = "";
    })
    .catch(() => {
      loginError.textContent = "Sign in failed. Check your credentials.";
      loginError.style.display = "block";
      document.getElementById("passwordInput").value = "";
    });
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    setAdminUi(true);
    loadBooks();
    return;
  }
  setAdminUi(false);
  document.getElementById("passwordInput").value = "";
});

/* ===== TOAST ===== */
function showToast(msg, isError = false) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.background = isError ? "#DC2626" : "#1B2A41";
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

/* ===== COVER PREVIEW ===== */
function previewCover(url) {
  const img = document.getElementById("coverPreview");
  if (url) {
    img.src = url;
    img.style.display = "block";
    img.onerror = () => img.style.display = "none";
  } else {
    img.style.display = "none";
  }
}

/* ===== ALL BOOKS STATE ===== */
let allBooks = [];
let currentGenreFilter = "all";

/* ===== LOAD BOOKS ===== */
function loadBooks() {
  db.collection("books").orderBy("createdAt", "desc").get().then(snapshot => {
    allBooks = [];
    snapshot.forEach(doc => allBooks.push({ id: doc.id, ...doc.data() }));

    const trending  = allBooks.filter(b => b.trending).length;
    const newRelease = allBooks.filter(b => b.newRelease).length;

    document.getElementById("totalBooks").textContent     = allBooks.length;
    document.getElementById("trendingCount").textContent  = trending;
    document.getElementById("newReleaseCount").textContent = newRelease;

    renderTable(allBooks);
  });
}

/* ===== RENDER TABLE ===== */
function renderTable(books) {
  const tbody = document.getElementById("booksTableBody");
  if (books.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-table">No books found</td></tr>`;
    return;
  }
  tbody.innerHTML = books.map(book => {
    const safeTitle = escapeHTML(book.title);
    const safeAuthor = escapeHTML(book.author);
    const safeGenre = escapeHTML(book.genre);
    const safeCover = safeUrl(book.cover) || "https://via.placeholder.com/36x50";
    const encodedTitle = encodeURIComponent(String(book.title || ""));
    return `
    <tr>
      <td><img src="${safeCover}" class="book-cover-thumb" onerror="this.src='https://via.placeholder.com/36x50'" /></td>
      <td><strong>${safeTitle}</strong></td>
      <td style="color:#6B7280">${safeAuthor}</td>
      <td><span class="genre-badge">${safeGenre}</span></td>
      <td>
        ${book.trending  ? '<span class="trending-badge">🔥 Trending</span> ' : ''}
        ${book.newRelease ? '<span class="new-badge">⭐ New</span>' : ''}
      </td>
      <td>
        <button class="edit-btn" onclick="toggleFlags('${book.id}', ${book.trending}, ${book.newRelease})">
          <i class="fa-solid fa-pen"></i> Edit Flags
        </button>
        <button class="delete-btn" onclick="deleteBook('${book.id}', '${encodedTitle}')">
          <i class="fa-solid fa-trash"></i> Delete
        </button>
      </td>
    </tr>`;
  }).join("");
}

/* ===== FILTER TABLE ===== */
function filterTable() {
  const q = document.getElementById("tableSearch").value.toLowerCase();
  let filtered = allBooks;
  if (currentGenreFilter !== "all") {
    filtered = filtered.filter(b => b.genre === currentGenreFilter);
  }
  if (q) {
    filtered = filtered.filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q)
    );
  }
  renderTable(filtered);
}

function setGenreFilter(genre, btn) {
  currentGenreFilter = genre;
  document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterTable();
}

/* ===== ADD BOOK ===== */
function addBook() {
  const title    = document.getElementById("bookTitle").value.trim();
  const author   = document.getElementById("bookAuthor").value.trim();
  const genre    = document.getElementById("bookGenre").value;
  const cover    = document.getElementById("bookCover").value.trim();
  const driveLink = document.getElementById("bookLink").value.trim();
  const trending  = document.getElementById("bookTrending").checked;
  const newRelease = document.getElementById("bookNewRelease").checked;

  if (!title || !author || !cover || !driveLink) {
    showToast("Please fill all required fields.", true);
    return;
  }

  const safeCover = safeUrl(cover);
  const safeDriveLink = safeUrl(driveLink);
  if (!safeCover || !safeDriveLink) {
    showToast("Cover and Drive link must be valid http/https URLs.", true);
    return;
  }
  let parsedDriveUrl;
  try {
    parsedDriveUrl = new URL(safeDriveLink);
  } catch (err) {
    showToast("Please enter a valid Google Drive link.", true);
    return;
  }
  if (!parsedDriveUrl.hostname.endsWith("drive.google.com")) {
    showToast("Please enter a valid Google Drive link.", true);
    return;
  }

  const btn = document.querySelector(".add-btn");
  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Adding...`;

  db.collection("books").add({
    title, author, genre, cover: safeCover, driveLink: safeDriveLink,
    trending, newRelease,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    document.getElementById("bookTitle").value   = "";
    document.getElementById("bookAuthor").value  = "";
    document.getElementById("bookCover").value   = "";
    document.getElementById("bookLink").value    = "";
    document.getElementById("bookTrending").checked   = false;
    document.getElementById("bookNewRelease").checked = false;
    document.getElementById("coverPreview").style.display = "none";
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-plus"></i> Add Book`;
    showToast("Book added successfully!");
    loadBooks();
  }).catch(err => {
    console.error(err);
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-plus"></i> Add Book`;
    showToast("Failed to add book.", true);
  });
}

/* ===== TOGGLE FLAGS ===== */
function toggleFlags(id, currentTrending, currentNewRelease) {
  // Create modal overlay
  const overlay = document.createElement("div");
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    display:flex;align-items:center;justify-content:center;z-index:9999;
  `;
  overlay.id = "flagsModal";

  overlay.innerHTML = `
    <div style="background:white;border-radius:16px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <h3 style="font-family:'Playfair Display',serif;font-size:22px;color:#1B2A41;margin-bottom:8px;">
        Edit Flags
      </h3>
      <p style="color:#6B7280;font-size:13px;margin-bottom:24px;">
        Toggle trending and new release status for this book.
      </p>

      <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:28px;">

        <label style="display:flex;align-items:center;justify-content:space-between;
               padding:14px 18px;border:1.5px solid #E2E8F0;border-radius:10px;cursor:pointer;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:20px;">🔥</span>
            <div>
              <div style="font-weight:600;font-size:14px;color:#1B2A41;">Trending</div>
              <div style="font-size:12px;color:#6B7280;">Shows in trending section</div>
            </div>
          </div>
          <input type="checkbox" id="modalTrending" ${currentTrending ? 'checked' : ''}
                 style="width:18px;height:18px;accent-color:#FF7A18;cursor:pointer;" />
        </label>

        <label style="display:flex;align-items:center;justify-content:space-between;
               padding:14px 18px;border:1.5px solid #E2E8F0;border-radius:10px;cursor:pointer;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:20px;">⭐</span>
            <div>
              <div style="font-weight:600;font-size:14px;color:#1B2A41;">New Release</div>
              <div style="font-size:12px;color:#6B7280;">Shows in new releases section</div>
            </div>
          </div>
          <input type="checkbox" id="modalNewRelease" ${currentNewRelease ? 'checked' : ''}
                 style="width:18px;height:18px;accent-color:#FF7A18;cursor:pointer;" />
        </label>

      </div>

      <div style="display:flex;gap:12px;">
        <button onclick="this.closest('div[style]').parentElement.remove()"
          style="flex:1;padding:12px;border:1.5px solid #E2E8F0;border-radius:8px;
                 background:white;font-family:'Poppins',sans-serif;font-size:14px;
                 font-weight:600;cursor:pointer;color:#6B7280;">
          Cancel
        </button>
        <button onclick="saveFlags('${id}')"
          style="flex:1;padding:12px;border:none;border-radius:8px;
                 background:linear-gradient(135deg,#1B2A41,#243B55);color:white;
                 font-family:'Poppins',sans-serif;font-size:14px;
                 font-weight:600;cursor:pointer;">
          Save Changes
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Close on backdrop click
  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.remove();
  });
}

function saveFlags(id) {
  const trending   = document.getElementById("modalTrending").checked;
  const newRelease = document.getElementById("modalNewRelease").checked;

  db.collection("books").doc(id).update({ trending, newRelease })
    .then(() => {
      const modal = document.getElementById("flagsModal");
      if (modal) modal.remove();
      showToast("Flags updated successfully!");
      loadBooks();
    })
    .catch(err => {
      console.error("Update error:", err);
      showToast("Error: " + err.message, true);
    });
}

/* ===== DELETE BOOK ===== */
function deleteBook(id, encodedTitle) {
  const title = decodeURIComponent(encodedTitle || "");
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  db.collection("books").doc(id).delete().then(() => {
    showToast("Book deleted.");
    loadBooks();
  }).catch(() => showToast("Delete failed.", true));
}
</script>

</body>
